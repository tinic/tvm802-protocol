# =============================================================================
#  TVM802 Protocol — machine-readable specification
#
#  Single source of truth. The Markdown docs explain "why"; this file is the
#  authoritative byte layout. All offsets, sizes, and constants here are
#  verified against live wire traffic unless a `confidence:` field says
#  otherwise.
#
#  Conventions:
#    - All multi-byte integers are little-endian unless stated.
#    - `offset` is from the start of the frame (request OR response).
#    - `type: u8 | u16le | u16be | s32le | u32le | ...`
#    - `confidence: verified | high | medium | low`
#    - `delivery: immediate | queued | both` — many commands have twin opcodes
#      (one immediate, one appended to the controller's FIFO).
# =============================================================================

meta:
  spec_version: "0.1.0"
  spec_date: "2026-05-28"
  device_family: "Qihe TVM802 (A / B / B+)"
  byte_order: little_endian
  alignment: 1

# -----------------------------------------------------------------------------
#  Transport layer
# -----------------------------------------------------------------------------
transport:
  protocol: tcp
  controller_role: server
  host_role: client
  default_endpoint:
    ip: 192.168.0.8
    port: 701
  multi_client_supported: true   # Second client can read params concurrently.
  socket_options:
    tcp_nodelay: true
    send_timeout_ms: 100
    recv_timeout_ms: 100
  framing:
    type: fixed_per_opcode       # Frame size determined entirely by byte[0].
    checksum: none
    length_prefix: none
  drain_before_write: true       # MUST discard any pending bytes before each
                                 # request, or the first response on a fresh
                                 # connection will misalign.

# -----------------------------------------------------------------------------
#  Common request header (first 4 bytes of every request)
# -----------------------------------------------------------------------------
request_header:
  - { name: opcode,   offset: 0, type: u8, doc: "Selects command. Determines total frame size." }
  - { name: sequence, offset: 1, type: u8, doc: "Sequence counter. Set by host on queued-command flush; 0 for immediate commands." }
  - { name: aux,      offset: 2, type: u8, doc: "Axis-mask or sub-argument; meaning is opcode-specific." }
  - { name: pad,      offset: 3, type: u8, doc: "Padding; observed as 0." }

ack_rule: |
  A response whose byte[0] equals the request's byte[0] is the ACK for that
  request. The host's transport layer drains stale bytes, sends the request,
  then reads frames until byte[0] matches; mismatches are discarded. There is
  no per-command status byte — motion completion is inferred from the status
  poll (opcode 0x00), not from response bytes.

sequence_counter:
  field: "byte[1] of every request"
  immediate_commands: "0 (zero), always"
  queued_commands: |
    Set by the host at flush time. The host maintains a running u8 counter
    that increments per queued frame popped off its outgoing list and sent
    to the controller. The counter wraps at 0xFF. The controller does NOT
    appear to validate the counter; a reimplementation may send 0 in queued
    frames as well, but the canonical behaviour is to increment.

connection_lifecycle:
  on_connect:
    - "Open TCP socket to controller endpoint."
    - "Set TCP_NODELAY; set 100 ms send/recv timeouts."
    - "Send opcode 0x05 (controller_init) ONCE — servo-enable."
    - "Read parameters (key 2/3 IP/port + any others) for sanity / startup config."
    - "Begin status_poll cadence (~50 ms)."
  not_on_every_motion: "Opcode 0x05 is sent ONCE per connection lifetime, not before every motion."
  on_reconnect:
    - "After socket failure, the host re-opens the connection."
    - "Re-issues opcode 0x05 to re-arm the servos."
    - "Resumes the status_poll loop; the controller's command FIFO is discarded across a disconnect."

retry_policy:
  per_request: "Maximum 2 attempts."
  on_total_failure: |
    The host's send/ack function returns failure to its caller. The caller's
    typical reaction is to surface an error to the user (dialog) and abort
    the in-flight operation. There is no automatic backoff or queued retry
    on the wire.
  on_socket_exception: "Hard fail — caller is responsible for re-establishing the connection."

# -----------------------------------------------------------------------------
#  Axis model
# -----------------------------------------------------------------------------
axes:
  count: 6
  position_encoding: |
    Each axis position on the wire is a signed int32 (LE) with the value:
        wire = round(mm * scale[i]) * 1000
    so the inverse for a reader is:
        mm = (wire / 1000) / scale[i]
    Note the int-truncated mm*scale step means positions are quantised to
    1/scale[i] mm, which matters for the rotary axes (scale 4.4444 → ~0.225°).
  scales: [1.0, 1.0, 32.8084, 4.4444, 32.8084, 4.4444]
  map:
    0:
      id: peel
      kind: linear
      description: |
        Shared peel-tape take-up motor. One motor pulls the cover tape off all
        active feeders simultaneously through a friction shaft. NOT the
        carrier-tape advance — see feeders model.
    1:
      id: z
      kind: rocker
      description: |
        Z plunge, SHARED between both nozzles via a mechanical rocker
        (seesaw, ~17 mm crank arm, 1600 step/rev). Only one nozzle is down
        at a time; lowering nozzle 2 raises nozzle 1. The protocol exposes
        ONE Z axis; the rocker geometry is in the mechanism, not the wire.
    2:
      id: x
      kind: linear
      description: "Gantry X."
    3:
      id: a1
      kind: rotary
      description: "Head-1 rotation (theta)."
    4:
      id: y
      kind: linear
      description: "Gantry Y."
    5:
      id: a2
      kind: rotary
      description: "Head-2 rotation (theta)."

axis_state_enum:
  type: u8
  values:
    0: idle
    1: moving      # confidence: high (any nonzero = busy is the safe rule)
    2: homing      # confidence: medium
    3: error       # confidence: medium
    4: limit_hit   # confidence: medium
  notes: |
    The safe reimplementation rule is: 0 == idle, anything nonzero == busy.
    The four nonzero codes are observed in the wild but their exact meaning
    is best treated as opaque for completion detection.

# -----------------------------------------------------------------------------
#  Event / error codes (status_poll response byte 46)
# -----------------------------------------------------------------------------
event_codes:
  type: u8
  values:
    0:
      id: none
      severity: nominal
      doc: "No event. Normal operation."
    1:
      id: cmd_order_error
      severity: error_emergency_stop
      host_response: |
        Stock host shows a dialog (resource string "cmdOrderError"), asserts
        output bit 0x800 (buzzer), and runs an emergency-stop sequence.
      doc: |
        Command-order violation. The controller received a command sequence
        it cannot execute — e.g. a queued move while paused, a move on an
        axis with an active limit, or a motion-profile mismatch.
    2:
      id: limit_signal_error
      severity: error_emergency_stop
      host_response: "Same as event 1: buzzer + dialog + emergency stop."
      doc: |
        A motion command was issued toward a limit switch that is already
        asserted. Distinct from a normal homing limit-hit (which the host
        expects). This indicates an attempted move into a wall.
  notes: |
    Only event codes 0, 1, 2 are checked by the stock host. The byte may
    carry other nonzero values from the controller; a reimplementation
    should log unknown nonzero codes for diagnosis but treat them as the
    same kind of fault as 1 / 2 (stop and surface the code).

# -----------------------------------------------------------------------------
#  Digital output bit map (set with opcodes 0x04 / 0x14 / 0x20-0x23)
# -----------------------------------------------------------------------------
digital_outputs:
  width_bits: 32
  bits:
    0x0001: { id: cam_light_pair, doc: "Camera-light pairing enable. Required alongside lamp_enable for the LED ring to light." }
    0x0002: { id: head1_blow,     doc: "Head 1 blow-off / release." }
    0x0004: { id: head1_vacuum,   doc: "Head 1 vacuum solenoid." }
    0x0008: { id: vacuum_pump_a,  doc: "Vacuum pump enable (paired with bit 0x400)." }
    0x0020: { id: run,            doc: "Run / start-cycle indicator." }
    0x0040: { id: suspend,        doc: "Suspend / pause indicator." }
    0x0080: { id: jog_mode_a,     doc: "Jog-speed selector (paired with 0x100)." }
    0x0100: { id: jog_mode_b,     doc: "Jog-speed selector (paired with 0x80). Together 0x180 = high-speed jog." }
    0x0200: { id: lamp_enable,    doc: "Light-ring power enable. The host writes 0x201 (this | cam_light_pair) to light the ring." }
    0x0400: { id: vacuum_pump_b,  doc: "Vacuum pump enable (paired with 0x8). 0x408 is the pump-on word." }
    0x0800: { id: buzzer,         doc: "Audible alarm." }
    0x1000: { id: head2_blow,     doc: "Head 2 blow-off / release." }
    0x2000: { id: head2_vacuum,   doc: "Head 2 vacuum solenoid." }
    0x4000: { id: prick_pin,      doc: "Pull-down pin actuator on the moving head. Drags carrier tape during feed." }
    0x8000: { id: cam_mux,        doc: "Camera up/down mux relay (CD4052). 0x8200 is the up-camera select word." }
  composite_values:
    light_ring_on:   0x0201   # lamp_enable | cam_light_pair
    pump_on:         0x0408   # vacuum_pump_a | vacuum_pump_b
    cam_mux_up:      0x8200   # cam_mux | lamp_enable (host writes both)
    jog_fast:        0x0180   # jog_mode_a | jog_mode_b

# -----------------------------------------------------------------------------
#  Digital input bit map (read from status poll, bytes 8..10)
# -----------------------------------------------------------------------------
digital_inputs:
  polarity: active_low_unless_noted
  bits:
    # byte[8]
    b2:  { id: x_limit_pos,   byte: 8, bit: 2, doc: "X positive limit." }
    b3:  { id: x_limit_neg,   byte: 8, bit: 3 }
    b4:  { id: y_limit_pos,   byte: 8, bit: 4 }
    b5:  { id: y_limit_neg,   byte: 8, bit: 5 }
    # byte[9]
    b9:  { id: z_home_limit,  byte: 9, bit: 1, doc: "Z home / limit switch." }
    # byte[10]
    b14: { id: btn_y_minus,   byte: 10, bit: 6, doc: "Operator panel: Y-." }
    b15: { id: btn_x_plus,    byte: 10, bit: 7, doc: "Operator panel: X+." }
    b16: { id: btn_step,      byte: 11, bit: 0, doc: "Operator panel: Step." }
    b17: { id: btn_stop,      byte: 11, bit: 1, doc: "Operator panel: Stop / Suspend." }
    b18: { id: btn_start,     byte: 11, bit: 2, doc: "Operator panel: Run / Start." }
    b19: { id: btn_x_minus,   byte: 11, bit: 3, doc: "Operator panel: X-." }
    b20: { id: btn_jog_speed, byte: 11, bit: 4, doc: "Operator panel: jog-speed select." }
    b21: { id: btn_y_plus,    byte: 11, bit: 5, doc: "Operator panel: Y+." }
    b22: { id: prick_home,    byte: 11, bit: 6, doc: "Prick-pin / piercer home position." }
  pickup_confirmation:
    type: analog_not_bit
    doc: |
      Per-head pickup confirmation is ANALOG, not a digital input.
      Read the two analog channels (status response bytes 42..45). The host
      compares (threshold - pressure); repeated fail raises pressureSensingError.
  e_stop:
    present: false
    doc: |
      There is NO emergency-stop bit in the protocol. E-stop is hardwired
      on the controller side and not visible to the network layer.

# -----------------------------------------------------------------------------
#  Parameter store (read via opcode 0x01, write via 0x02, commit via 0x03)
#
#  The store has TWO regions:
#    - keys 0..61   : scalar parameters, named individually
#    - keys 85..479 : indexed tables (Table A through Table F)
#
#  Each `unit:` below is one of:
#    raw                — int32, no conversion
#    micron             — wire / 1000 = mm  (positions, Z heights, offsets)
#    micropx_per_mm     — wire / 10000 = mm/pixel  (camera scales)
#    centi              — wire / 100 = real value (deviation thresholds)
#    millis             — wire = milliseconds (settle waits, delays)
#    bool               — wire != 0 = true
#    flag_byte_8        — 8 booleans packed into bits 0..7
#    packed_ipv4_le     — 4 bytes = IPv4 octets, little-endian
#    packed_i16x2       — (high signed 16) and (low signed 16), independent values
#    packed_u16x2       — (high u16) and (low u16), independent values
#    packed_byte_x4     — 4 bytes, MSB-first ordering
#    u16                — wire & 0xFFFF
# -----------------------------------------------------------------------------
parameters:
  width_bits: 32
  signed: true
  key_count_observed: 601
  units:
    micron:           "wire / 1000 = mm"
    micropx_per_mm:   "wire / 10000 = mm/pixel"
    centi:            "wire / 100 = real value"
    millis:           "wire = milliseconds"

  # ---------------------------------------------------------------------------
  # Scalars (keys 0..61). Sparse; gaps (49, 62-84) are unused or reserved.
  # `confidence:` is verified unless noted. Chinese labels are taken from the
  # host's ParamEdit dialog and preserved verbatim.
  # ---------------------------------------------------------------------------
  scalars:
    0:  { id: machine_serial_hi,     unit: raw,             label_cn: "MAC地址",                     doc: "Machine serial / MAC high 32 bits." }
    1:  { id: machine_serial_lo,     unit: u16,             label_cn: "MAC地址",                     doc: "Machine serial / MAC low 16 bits." }
    2:  { id: controller_ip,         unit: packed_ipv4_le,                                          doc: "0x0800A8C0 = 192.168.0.8 (factory default)." }
    3:  { id: controller_port,       unit: u16,                                                     doc: "Default 701." }
    4:  { id: home_x,                unit: micron,          label_cn: "原点坐标 (X)",                doc: "Home position X (machine zero)." }
    5:  { id: home_y,                unit: micron,          label_cn: "原点坐标 (Y)",                doc: "Home position Y." }
    6:  { id: n1_upcam_pos_x,        unit: micron,          label_cn: "相机坐标1 (X)",               doc: "Head-1 position centred over the up-vision camera, X." }
    7:  { id: n1_upcam_pos_y,        unit: micron,          label_cn: "相机坐标1 (Y)",               doc: "Head-1 over up-camera, Y." }
    8:  { id: cam_offset_x,          unit: micron,                                                  doc: "Camera-to-machine reference offset, X." }
    9:  { id: cam_offset_y,          unit: micron,                                                  doc: "Camera reference offset, Y." }
    10: { id: prick_offset_x,        unit: micron,                                                  doc: "Prick-pin offset from head reference, X." }
    11: { id: prick_offset_y,        unit: micron,                                                  doc: "Prick-pin offset from head reference, Y." }
    12: { id: discard_x,             unit: micron,          label_cn: "弃料坐标 (X)",                doc: "Reject / discard bin position, X." }
    13: { id: discard_y,             unit: micron,          label_cn: "弃料坐标 (Y)",                doc: "Discard bin Y." }
    14: { id: nozzle_z_pcb,          unit: micron,                                                  doc: "Nozzle plunge Z for PCB placement." }
    15: { id: nozzle_z_feeder,       unit: micron,                                                  doc: "Nozzle plunge Z for tape-feeder pickup." }
    16: { id: nozzle_z_front_stack,  unit: micron,                                                  doc: "Nozzle plunge Z for front tray pickup." }
    17: { id: nozzle_z_discard,      unit: micron,                                                  doc: "Nozzle plunge Z for discard drop." }
    18: { id: prick_z,               unit: micron,                                                  doc: "Prick-pin plunge depth (Z)." }
    19: { id: feature_flag_misc,     unit: bool,                                                    doc: "Generic feature flag (purpose machine-specific)." }
    20: { id: upcam_scale_x,         unit: micropx_per_mm,  label_cn: "相机比例 (X)",                doc: "Up-vision camera X scale." }
    21: { id: upcam_scale_y,         unit: micropx_per_mm,  label_cn: "相机比例 (Y)",                doc: "Up-vision camera Y scale." }
    22: { id: vision_z,              unit: micron,                                                  doc: "Up-vision focal Z; often 0." }
    23: { id: feature_flags_8,       unit: flag_byte_8,                                             doc: "Eight feature flags packed into bits 0..7. See parameters.flag_register_23 below." }
    24: { id: nozzle_vacuum_thresh,  unit: raw,             label_cn: "吸嘴阈值",                    doc: "Nozzle empty / vacuum-pressure threshold (low)." }
    25: { id: comp_vacuum_thresh,    unit: raw,             label_cn: "元件阈值",                    doc: "Component-present vacuum threshold (high)." }
    26: { id: nozzle_vision_z,       unit: micron,                                                  doc: "Nozzle Z at vision pose; often 0." }
    27: { id: nozzle_offset_x,       unit: micron,                                                  doc: "Nozzle offset relative to head reference, X." }
    28: { id: nozzle_offset_y,       unit: micron,                                                  doc: "Nozzle offset, Y." }
    29: { id: n1_feeder_settle_ms,   unit: millis,                                                  doc: "Nozzle-1 settle delay at feeder pickup." }
    30: { id: pcb_settle_ms_a,       unit: millis,                                                  doc: "Settle delay after nozzle plunge at PCB (variant A)." }
    31: { id: pcb_settle_ms_b,       unit: millis,                                                  doc: "Settle delay after nozzle plunge at PCB (variant B)." }
    32: { id: n2_feeder_settle_ms,   unit: millis,                                                  doc: "Nozzle-2 settle delay at feeder pickup." }
    33: { id: auto_sort_flag,        unit: bool,                                                    doc: "Enable auto-sort of placement order. -1 (all bits) common in backups." }
    34: { id: downcam_scale_x,       unit: micropx_per_mm,  label_cn: "下视相机比例 (X)",            doc: "Down-vision camera X scale." }
    35: { id: downcam_scale_y,       unit: micropx_per_mm,  label_cn: "下视相机比例 (Y)",            doc: "Down-vision camera Y scale." }
    36: { id: up_vision_angle,       unit: micron,                                                  doc: "Up-vision angle-calibration constant." }
    37: { id: prick_retract,         unit: micron,          label_cn: "拨针回退",                    doc: "Prick-pin retract distance after feed." }
    38: { id: nozzle_cal_x,          unit: micron,                                                  doc: "Nozzle calibration X (head-2 or N1 detail)." }
    39: { id: nozzle_cal_y,          unit: micron,                                                  doc: "Nozzle calibration Y." }
    40: { id: nozzle_cal_z,          unit: micron,                                                  doc: "Nozzle calibration Z primary." }
    41: { id: nozzle_cal_z2,         unit: micron,                                                  doc: "Nozzle calibration Z secondary." }
    42: { id: mark_vision_offset_x,  unit: micron,          label_cn: "下视中心 (X)",                doc: "Down-camera fiducial / mark-vision centre offset, X." }
    43: { id: mark_vision_offset_y,  unit: micron,          label_cn: "下视中心 (Y)",                doc: "Down-camera fiducial centre offset, Y." }
    44: { id: prick_offset_x_alt,    unit: micron,                                                  doc: "Prick-pin offset (secondary set), X." }
    45: { id: prick_offset_y_alt,    unit: centi,                                                   doc: "Prick-pin offset (secondary), Y (* 100 units)." }
    46: { id: prick_pos_x,           unit: micron,                                                  doc: "Prick-pin assembly mounting position, X." }
    47: { id: prick_pos_y,           unit: micron,                                                  doc: "Prick-pin assembly mounting position, Y." }
    48: { id: up_cam_settle_ms,      unit: millis,                                                  doc: "Up-camera settle delay after camera switch." }
    50: { id: controller_scale_x,    unit: micropx_per_mm,                                          doc: "Controller-internal X scale (~1.0 calibration factor)." }
    51: { id: controller_scale_y,    unit: micropx_per_mm,                                          doc: "Controller-internal Y scale (~1.0 calibration factor)." }
    52: { id: dev_thresh_xy,         unit: centi,                                                   doc: "XY-deviation threshold for placement-correction warnings." }
    53: { id: dev_thresh_angle,      unit: centi,                                                   doc: "Angle-deviation threshold (degrees * 100)." }
    54: { id: vacuum_thresh_pack_a,  unit: packed_u16x2,                                            doc: "Vacuum thresholds (channels 1 & 2) packed (hi<<16)|lo. See parameters.vacuum_threshold_pairs." }
    55: { id: vacuum_thresh_pack_b,  unit: packed_u16x2,                                            doc: "Vacuum thresholds (channels 3 & 4)." }
    56: { id: z_home_offset,         unit: micron,                                                  doc: "Z home offset; write-only — used by the host to reset Z during homing." }
    57: { id: vacuum_scale_pack,     unit: packed_u16x2,                                            doc: "Vacuum analog scale: ((hi/100), (lo/100)) → multipliers for status_poll.vacuum_1_raw / vacuum_2_raw." }
    58: { id: camera_mirror_pack,    unit: packed_i16x2,                                            doc: "(up_mirror<<16) | (down_mirror & 0xFFFF). MVision-DLL flip codes." }
    59: { id: motor_subdivision,     unit: raw,             label_cn: "电机细分",                    doc: "Motor microstep subdivision (encoded; UI shows raw / 8). This value ALSO functions as a per-axis velocity multiplier in the host's motion equations — changing it rescales jog and move speeds." }
    60: { id: n2_upcam_pos_x,        unit: micron,          label_cn: "相机坐标2 (X)",               doc: "Head-2 position over up-vision camera, X." }
    61: { id: n2_upcam_pos_y,        unit: micron,          label_cn: "相机坐标2 (Y)",               doc: "Head-2 over up-camera, Y." }

  # Bit unpack for key 23.
  flag_register_23:
    bit0: { id: use_pressure_check,         doc: "Enable vacuum-pressure pickup confirmation." }
    bit1: { id: use_auto_sort,              doc: "Re-order placements by proximity to minimise travel." }
    bit2: { id: use_auto_return_home,       doc: "Return to home after job complete." }
    bit3: { id: left_stack_positioning,     doc: "LEFT-bank feeder positioning mode." }
    bit4: { id: back_stack_positioning,     doc: "BACK-bank feeder positioning mode." }
    bit5: { id: reserved_5,                 doc: "Reserved / undocumented." }
    bit6: { id: reserved_6,                 doc: "Reserved / undocumented." }
    bit7: { id: reserved_7,                 doc: "Reserved / undocumented." }

  # Unpack rules for the packed vacuum-threshold keys (54, 55).
  vacuum_threshold_pairs:
    description: |
      Two packed 32-bit words hold four head/channel vacuum thresholds.
      For each key:
        threshold_hi = (raw >> 16) & 0xFFFF
        threshold_lo = (raw      ) & 0xFFFF
    layout:
      key_54_hi: { channel: 1, doc: "Head-1 vacuum threshold A." }
      key_54_lo: { channel: 2, doc: "Head-2 vacuum threshold A." }
      key_55_hi: { channel: 3, doc: "Head-1 vacuum threshold B (or aux)." }
      key_55_lo: { channel: 4, doc: "Head-2 vacuum threshold B (or aux)." }

  # ---------------------------------------------------------------------------
  # Indexed tables. Each table has a fixed element count and stride.
  # ---------------------------------------------------------------------------
  tables:

    table_a:
      name: "Machine identity / payload"
      range: { start: 85, end: 99 }
      count: 15
      stride: 1
      element:
        type: packed_byte_x4
        doc: "Four bytes per element; backups typically show 0x3C3C3C3C (default fill)."
      doc: "Purpose not fully decoded; likely firmware identity, model code, or vendor payload."
      confidence: medium

    table_b_feeders:
      name: "Tape-feeder slot configuration"
      range: { start: 100, end: 279 }
      count: 60
      stride: 3
      element:
        layout:
          - { offset: 0, id: pos_x,         unit: micron,        doc: "Feeder slot X position." }
          - { offset: 1, id: pos_y,         unit: micron,        doc: "Feeder slot Y position." }
          - { offset: 2, id: type_id_pack,  unit: packed_u16x2,  doc: "(type<<16) | (id & 0xFFFF). type ∈ {8, 12, 16, 24} maps to component-height LUT (3.5 / 5.5 / 7.5 / 11.0 mm)." }
      banks:
        - { name: LEFT, slots: "0..29", drag_axis: x, doc: "Mounted on the left side of the machine; head drags carrier tape along X." }
        - { name: BACK, slots: "30..59", drag_axis: y, doc: "Mounted on the back; drag axis is Y." }
      example:
        slot_0:
          raw: { key_100: -45230, key_101: -4690, key_102: 524292 }
          decoded: { pos_x: -45.230, pos_y: -4.690, type: 8, id: 4, derived_height_mm: 3.5 }

    table_c_fiducials_1:
      name: "Down-vision fiducial reference set 1"
      range: { start: 300, end: 359 }
      count: 30
      stride: 2
      element:
        layout:
          - { offset: 0, id: pos_x, unit: micron }
          - { offset: 1, id: pos_y, unit: micron }
      doc: "Board fiducial positions (down-camera). 30 slots, sparsely used."

    table_d_fiducials_2:
      name: "Down-vision fiducial reference set 2"
      range: { start: 360, end: 419 }
      count: 30
      stride: 2
      element:
        layout:
          - { offset: 0, id: pos_x, unit: micron }
          - { offset: 1, id: pos_y, unit: micron }
      doc: "Second fiducial set; purpose mirrors table_c (alternate board layouts, bottom-side, or backup)."
      confidence: medium

    table_e_tray_meta:
      name: "Tray / stack metadata"
      range: { start: 420, end: 449 }
      count: 30
      stride: 1
      element:
        type: packed_u16x2
        doc: "(stack_type<<16) | (instance_id & 0xFFFF)."
      doc: "Per-tray metadata for the front tray-stack feeders (orientation, count, feed direction)."
      confidence: medium

    table_f_advanced:
      name: "Advanced component / vision config"
      range: { start: 450, end: 479 }
      count: 30
      stride: 1
      element:
        type: packed_byte_x4
        doc: "Four bytes per element; each byte * 100 = a sub-value."
      doc: "Written by the newer parameter-edit path; not read in older firmware. Purpose not fully decoded."
      confidence: low

  notes: |
    Keys outside the documented scalars or tables (62..84, 280..299, 480..600)
    are unused or reserved. In a typical TVM802B backup, unused keys read as
    -1 (sentinel) or 0.

    Always commit (opcode 0x03) after a write burst. A reimplementation that
    intends to write should ALWAYS back up the full key space first via the
    read_param loop (key 0..600); restoring requires writing each non-zero key
    back and a final commit.

# -----------------------------------------------------------------------------
#  Opcodes
# -----------------------------------------------------------------------------
opcodes:

  - code: 0x00
    name: status_poll
    delivery: immediate
    summary: "Read full machine state. The polling frame; called every UI tick (~50 ms)."
    request:
      size: 4
      bytes: [0x00, 0x00, 0x00, 0x00]
    response:
      size: 47
      fields:
        - { name: opcode_echo,   offset: 0,  type: u8 }
        - { name: sequence,      offset: 1,  type: u8 }
        - { name: queue_free,    offset: 2,  type: u8,    doc: "Free slots in controller command FIFO (~7 max). Host gates queued writes on this > 0." }
        - { name: reserved_3,    offset: 3,  type: u8 }
        - { name: status_word,   offset: 4,  type: u16le, doc: "Bit-packed status. Bit 0 = system moving; bit 1 = job running; bit 2 = home active; bit 4 = limit hit; bits 5-15 vendor-specific." }
        - { name: reserved_6,    offset: 6,  type: u16le }
        - { name: input_byte_0,  offset: 8,  type: u8,    doc: "Digital input byte 0; see digital_inputs map." }
        - { name: input_byte_1,  offset: 9,  type: u8 }
        - { name: input_byte_2,  offset: 10, type: u8 }
        - { name: input_byte_3,  offset: 11, type: u8 }
        - name: axis_position
          offset: 12
          type: s32le_array
          count: 6
          stride: 4
          doc: "Position per axis 0..5. Decode: mm = (raw / 1000) / scales[axis]."
        - { name: axis_state_0,  offset: 36, type: u8, doc: "Axis 0 (peel) state; 0 = idle." }
        - { name: axis_state_1,  offset: 37, type: u8, doc: "Axis 1 (z) state." }
        - { name: axis_state_2,  offset: 38, type: u8, doc: "Axis 2 (x) state." }
        - { name: axis_state_3,  offset: 39, type: u8, doc: "Axis 3 (a1) state." }
        - { name: axis_state_4,  offset: 40, type: u8, doc: "Axis 4 (y) state." }
        - { name: axis_state_5,  offset: 41, type: u8, doc: "Axis 5 (a2) state." }
        - { name: vacuum_1_raw,  offset: 42, type: u16le, doc: "Head-1 vacuum analog. Real reading = raw * vacuum_scale_1 (per-machine calibration)." }
        - { name: vacuum_2_raw,  offset: 44, type: u16le, doc: "Head-2 vacuum analog." }
        - { name: event_code,    offset: 46, type: u8,    doc: "Controller event / error code. See event_codes table below." }

  - code: 0x01
    name: read_param
    delivery: immediate
    summary: "Read one keyed configuration parameter."
    request:
      size: 12
      template: [0x01, 0x00, 0x00, 0x00, "key.b0", "key.b1", "key.b2", "key.b3", 0x00, 0x00, 0x00, 0x00]
      fields:
        - { name: opcode,  offset: 0,  type: u8 }
        - { name: key,     offset: 4,  type: u32le, doc: "Parameter key; see parameters.known_keys." }
    response:
      size: 12
      fields:
        - { name: opcode_echo, offset: 0,  type: u8 }
        - { name: value,       offset: 8,  type: s32le, doc: "Raw parameter value. Apply the key's unit (position_keys_x1000 ⇒ /1000 mm; scale_keys_x10000 ⇒ /10000 mm/px)." }

  - code: 0x02
    name: write_param
    delivery: immediate
    summary: "Write one keyed configuration parameter. Must be followed by opcode 0x03 to commit."
    request:
      size: 12
      fields:
        - { name: opcode, offset: 0,  type: u8 }
        - { name: key,    offset: 4,  type: u32le }
        - { name: value,  offset: 8,  type: s32le, doc: "Raw value, same unit convention as read_param." }
    response:
      size: 12
      fields:
        - { name: opcode_echo, offset: 0, type: u8 }
    caution: "Writes are non-destructive only after the commit (0x03). Bursts of writes for one logical change always end with one 0x03."

  - code: 0x03
    name: commit_params
    delivery: immediate
    summary: "Commit / apply the most recent write_param burst. Terminates a parameter-edit sequence."
    request:
      size: 4
      bytes: [0x03, 0x00, 0x00, 0x00]
    response:
      size: 4
    notes: "NOT a job-start, NOT a reset; only latches pending param writes."

  - code: 0x04
    name: set_outputs_immediate
    delivery: immediate
    summary: "Replace the digital-output word, immediate."
    request:
      size: 8
      fields:
        - { name: opcode,  offset: 0, type: u8 }
        - { name: outputs, offset: 4, type: u32le, doc: "Full 32-bit output bitmap; see digital_outputs." }

  - code: 0x05
    name: controller_init
    delivery: immediate
    summary: "Servo / controller init after TCP connect. Host issues once on (re)connect."
    request:
      size: 8
      bytes: [0x05, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]

  - code: 0x06
    name: set_motion_profile_immediate
    delivery: immediate
    summary: "Set per-axis acceleration / deceleration / velocity tables, immediate."
    request:
      size: 76
      fields:
        - { name: opcode,   offset: 0,  type: u8 }
        - { name: axis,     offset: 2,  type: u8, doc: "Target axis index 0..5." }
        - name: accel
          offset: 4
          type: u32le_array
          count: 6
          doc: "Per-axis acceleration steps."
        - name: decel
          offset: 28
          type: u32le_array
          count: 6
        - name: velocity
          offset: 52
          type: u32le_array
          count: 6
          doc: "Per-axis velocity; multiplied by the active speed-percent (0..100)."
    notes: "Issued before every job move; cheap to re-send."

  - code: 0x07
    name: teach_position_immediate
    delivery: immediate
    summary: "TEACH: set the controller's idea of current position for one axis. NOT a move."
    request:
      size: 28
      fields:
        - { name: opcode,    offset: 0, type: u8 }
        - { name: axis_mask, offset: 2, type: u8 }
        - name: positions
          offset: 4
          type: s32le_array
          count: 6
          doc: "Per-axis target position (raw, same encoding as status_poll axis_position)."
    use_cases:
      - "Zero homing after limit-stop sequence."
      - "Apply a fiducial offset correction without commanding motion."

  - code: 0x08
    name: move_immediate
    delivery: immediate
    summary: "Coordinated move on one or more axes, immediate. Skips axes already at target."
    request:
      size: 28
      fields:
        - { name: opcode,    offset: 0, type: u8 }
        - { name: axis_mask, offset: 2, type: u8, doc: "Bit i set = include axis i in this move. 0x3F = all 6." }
        - name: targets
          offset: 4
          type: s32le_array
          count: 6
          doc: "Per-axis target position; ignored for axes not in mask."
    completion: "Polled via status_poll: axis_state[i]==0 AND axis_position[i]==target."

  - code: 0x09
    name: stop
    delivery: immediate
    summary: "Stop one or more axes."
    request:
      size: 8
      fields:
        - { name: opcode,    offset: 0, type: u8 }
        - { name: axis_mask, offset: 2, type: u8, doc: "0x3F = stop all." }
    use_cases: "Jog button-release, Stop button, error abort."

  - code: 0x0B
    name: program_control
    delivery: immediate
    summary: "Program / queue control."
    request:
      size: 4
      fields:
        - { name: opcode,  offset: 0, type: u8 }
        - { name: command, offset: 2, type: u8, doc: "0 = clear/reset program (also clears queued list; used as queue-ready gate), 1 = run/resume, 2 = pause/suspend." }

  - code: 0x0C
    name: move_buffered
    delivery: queued
    summary: "Buffered (queued) move on the main motion axes. The standard job move."
    request:
      size: 28
      fields:
        - { name: opcode,    offset: 0, type: u8 }
        - { name: sequence,  offset: 1, type: u8 }
        - { name: axis_mask, offset: 2, type: u8, doc: "In production: mask covers axes 1..5 (Z + X + Y + A1 + A2); axis 0 is the dedicated feed opcode." }
        - name: targets
          offset: 4
          type: s32le_array
          count: 6
    notes: "Appended to the controller FIFO; flushed when status_poll.queue_free > 0."

  - code: 0x0D
    name: feed_axis0
    delivery: queued
    summary: "Feeder advance: relative step on axis 0 (peel). Always negative direction."
    request:
      size: 28
      fields:
        - { name: opcode,    offset: 0, type: u8 }
        - { name: sequence,  offset: 1, type: u8 }
        - { name: axis_mask, offset: 2, type: u8, doc: "Always 0x01 (axis 0 only)." }
        - name: targets
          offset: 4
          type: s32le_array
          count: 6
          doc: "targets[0] is the relative step count (negative)."

  - code: 0x0E
    name: set_outputs_queued
    delivery: queued
    summary: "Replace the digital-output word, appended to queue."
    request:
      size: 8
      fields:
        - { name: opcode,  offset: 0, type: u8 }
        - { name: outputs, offset: 4, type: u32le }

  - code: 0x0F
    name: set_motion_profile_queued
    delivery: queued
    summary: "Queued form of set_motion_profile_immediate. Same payload."
    request:
      size: 76
      same_as: 0x06

  - code: 0x11
    name: dwell
    delivery: queued
    summary: "Sleep / dwell for N milliseconds; appended to queue."
    request:
      size: 8
      fields:
        - { name: opcode, offset: 0, type: u8 }
        - { name: ms,     offset: 2, type: u16le, doc: "Dwell duration in milliseconds." }

  - code: 0x12
    name: teach_position_queued
    delivery: queued
    summary: "Queued form of teach_position_immediate. Same payload as 0x07."
    request:
      size: 28
      same_as: 0x07

  - code: 0x13
    name: pick_sync
    delivery: queued
    summary: "Pick-sequence sync / latch. Emitted between prick assertion and tape advance."
    request:
      size: 4
      fields:
        - { name: opcode, offset: 0, type: u8 }
        - { name: latch,  offset: 2, type: u8, doc: "Always observed as 1 in production traffic." }
    confidence: low
    notes: |
      Exact hardware semantic is opaque. Present in every pick FSM run between
      output 0x4000 (prick) assertion and the opcode 0x0D feeder advance.

  - code: 0x14
    name: output_bit_on_immediate
    delivery: immediate
    summary: "Set ONE digital output bit ON, immediate. Does not affect other bits."
    request:
      size: 8
      fields:
        - { name: opcode, offset: 0, type: u8 }
        - { name: bit,    offset: 4, type: u32le, doc: "Bitmask of output(s) to turn on (typically a single bit)." }

  - code: 0x15
    name: output_bit_off_immediate
    delivery: immediate
    summary: "Clear ONE digital output bit, immediate."
    request:
      size: 8
      fields:
        - { name: opcode, offset: 0, type: u8 }
        - { name: bit,    offset: 4, type: u32le }

  - code: 0x16
    name: output_bit_on_queued
    delivery: queued
    summary: "Queued form of output_bit_on_immediate."
    request:
      size: 8
      same_as: 0x14

  - code: 0x17
    name: output_bit_off_queued
    delivery: queued
    summary: "Queued form of output_bit_off_immediate."
    request:
      size: 8
      same_as: 0x15

# -----------------------------------------------------------------------------
#  Camera subsystem (USB grabber + analog decoder)
#
#  Two cameras share one USB capture device through a CD4052 analog mux.
#  The mux is driven by the controller (TCP protocol, output bits — see
#  digital_outputs.cam_mux / lamp_enable above). The USB grabber and the
#  SAA7113 video decoder behind it have their own protocols (USB control
#  transfers, I²C on the SAA7113). This section documents the camera
#  subsystem identifiers and the SAA7113 register subset; full chain walk
#  and code examples are in docs/12-camera-system.md.
# -----------------------------------------------------------------------------
camera_system:
  signal_chain: "cameras → CD4052 mux → SAA7113 decoder → STK1160/STK1150 USB bridge → host"
  grabber:
    chip: "Syntek STK1150 (or STK1160; identical USB interface)"
    usb_vid: 0x05E1
    usb_pid: 0x0408
    product_name: "USB2.0 Grabber"
    pixel_formats: ["UYVY 640x480", "YUY2 640x480"]
    rgb_supported: false
    output_depth_bits: 8
    internal_adc_bits: 10
    note: |
      Although the chip's ADC is 10-bit, only 8-bit UYVY is exposed over USB.
      Raw 10-bit access is not available without firmware modification.
  video_decoder:
    chip: "Philips/NXP SAA7113H"
    i2c_address_7bit_default: 0x25     # RTS0 strapped HIGH
    i2c_address_7bit_alt:     0x24     # RTS0 strapped LOW
    interlace: "field-by-field, deinterlaced in-chip; output is a single field per USB frame"
    standard: "auto-detect NTSC / PAL / SECAM (configurable via reg 0x0E)"
  stk1160_vendor_requests:
    register_read:
      bmRequestType: 0xC0
      bRequest:      0x00
      wValue:        0x0000
      wIndex:        "register address (u16)"
      wLength:       1
    register_write:
      bmRequestType: 0x40
      bRequest:      0x01
      wValue:        "value (low byte)"
      wIndex:        "register address (u16)"
      wLength:       0
  stk1160_register_blocks:
    0x0nn: gpio
    0x1nn: video_decoder_config
    0x2nn: i2c_master_to_saa7113
    0x3nn: timing_generator
    0x5nn: audio
  stk1160_i2c_master:
    sictl_base: 0x200
    sictl_status: 0x201
    sictl_slave_addr_byte: 0x203
    sbusw_subaddr: 0x204
    sbusw_data:    0x205
    sbusr_subaddr: 0x208
    sbusr_data:    0x209
    write_kick_bit: 0x01    # write 0x01 to 0x200 to begin a write
    read_kick_bit:  0x20    # write 0x20 to 0x200 to begin a read
    write_finished_bit: 0x04  # status byte 0x201 bit 2
    read_finished_bit:  0x01  # status byte 0x201 bit 0
  saa7113_registers:
    0x00: { name: chip_ident, access: ro,  doc: "Chip ID; non-0xFF response confirms presence." }
    0x02: { name: input_ctl1, access: rw,  doc: "MODE[3:0] = analog input select; FUSE[1:0] = AGC mode." }
    0x03: { name: input_ctl2, access: rw,  doc: "GAFIX = manual-gain enable; GAI18/GAI28 = chan1/chan2 gain MSBs." }
    0x04: { name: input_ctl3, access: rw,  doc: "Chan-1 manual gain, low byte." }
    0x05: { name: input_ctl4, access: rw,  doc: "Chan-2 manual gain, low byte." }
    0x0A: { name: brightness, access: rw,  default: 0x80, doc: "u8; 0x80 = midpoint." }
    0x0B: { name: contrast,   access: rw,  default: 0x44, doc: "signed s7; 0x40 = 1.0×." }
    0x0C: { name: saturation, access: rw,  default: 0x40, doc: "signed s7; 0x40 = 1.0×." }
    0x0D: { name: hue,        access: rw,  default: 0x00, doc: "signed s8." }
    0x0E: { name: chroma_ctl1, access: rw, doc: "CSTD[2:0] selects NTSC / PAL / SECAM." }
    0x0F: { name: chroma_gain, access: rw, doc: "ACGC = auto-chroma-gain enable; CGAIN[6:0] manual." }
    0x1F: { name: status,     access: ro,  doc: "Lock bits, standard-detect bits." }
  saa7113_reserved_subaddresses: [0x14, "0x18..0x1E", "0x20..0x3F", "0x63..0xFF"]
  pixel_scale_source:
    note: "Per-camera, per-axis mm/pixel scale lives in the CONTROLLER parameter store, not in the USB stream."
    up_camera_x_key: 20
    up_camera_y_key: 21
    down_camera_x_key: 34
    down_camera_y_key: 35
    typical_values:
      up:   { x: 0.0446, y: 0.0426 }
      down: { x: 0.0268, y: 0.0253 }
    anisotropy: "X and Y scales differ by ~6%; effective pixels are not square on the analog/interlaced chain."
  mirror_flags_key: 58
  persistence: |
    SAA7113 register state persists as long as USB Vbus is asserted; it
    survives a Windows driver swap (Zadig → WinUSB → back to bundled driver)
    but is reset by a full USB plug-cycle. Practical pattern: a one-shot
    tuning script run at boot.

# -----------------------------------------------------------------------------
#  Reserved opcodes — declared in the enum, never emitted by the stock host.
#  Do not send these from a reimplementation; behaviour is undefined and may
#  vary by firmware. The opcode space is intentionally exhausted here so a
#  conforming receiver knows which byte[0] values to reject vs. tolerate.
# -----------------------------------------------------------------------------
reserved_opcodes:
  - code: 0x0A
    name: reserved_10
    status: declared_never_emitted
    doc: |
      Present in the controller's opcode enum but never sent by the stock host
      and not observed in any live capture. Reimplementations must not emit
      this opcode.
  - code: 0x10
    name: reserved_16
    status: declared_never_emitted
    doc: "Same status as 0x0A."
  - range: { start: 0x18, end: 0xFF }
    status: out_of_enum
    doc: |
      Outside the controller's declared opcode enum (which ends at 0x17).
      Sending any value in this range is undefined; some firmwares ignore,
      others may misinterpret as the low byte of an opcode-echo and produce
      desynchronised responses. Do not send.

# -----------------------------------------------------------------------------
#  Completion / flow-control model
# -----------------------------------------------------------------------------
completion_model:
  per_command_ack: false
  motion_done_rule: |
    For axis i, a move is considered done when BOTH:
      (a) status_poll.axis_state[i] == 0
      (b) status_poll.axis_position[i] == requested_target
    Polling cadence on the stock host is ~50 ms (one UI timer tick).
  queue_model: |
    Queued commands (delivery: queued) are appended to a host-side list and
    flushed to the controller while status_poll.queue_free > 0. The controller's
    FIFO depth is ~7. This queue + the status poll IS the motion-completion
    contract; there is no per-move ACK from the controller.
  drain_recovery: |
    If frames misalign (wrong opcode echoed), the host drains the socket
    receive buffer and re-issues the request. A reimplementation should do
    the same; do not try to checksum or re-frame from the middle.

# -----------------------------------------------------------------------------
#  Composite operations — non-opcode procedures the host uses
# -----------------------------------------------------------------------------
procedures:

  homing:
    summary: "Per-axis home sequence."
    steps:
      - "0x06 set_motion_profile — fast approach profile."
      - "0x08 move_immediate toward the home limit switch."
      - "Poll status_poll; watch the appropriate limit bit in input bytes."
      - "0x09 stop on limit assertion."
      - "0x06 set_motion_profile — slow profile."
      - "0x08 move_immediate back off + re-approach slowly."
      - "0x07 teach_position — zero the axis."
    axis_order: "X then Y. Z first if Z-equipped (param 45 enables)."

  feed_one_part:
    summary: "Advance one carrier-tape pitch on a feeder."
    notes: |
      Feeders are NOT per-slot motors. The prick-pin lives on the moving head
      (output 0x4000); the head physically drags the carrier tape one pitch
      while axis 0 takes up the peel tape.
    steps:
      - "0x12 teach_position_queued — zero axis 0 (peel)."
      - "0x16 output_bit_on_queued bit=0x4000 — extend prick pin."
      - "0x13 pick_sync."
      - "0x11 dwell — settle."
      - "0x0C move_buffered — head X or Y move by one tape pitch (negative steps; 1500 or 3000 by part size)."
      - "0x0D feed_axis0 — peel-tape take-up."
      - "0x17 output_bit_off_queued bit=0x4000 — retract prick pin."

  camera_switch:
    summary: "Toggle camera mux between up and down."
    notes: |
      Up and down cameras share one DirectShow capture device (a USB grabber).
      The selection is a CD4052 analog mux driven by output bits.
    select_down:
      - "0x15 output_bit_off_immediate bit=0x8000 — drop cam_mux."
    select_up:
      - "0x14 output_bit_on_immediate  bit=0x8200 — assert cam_mux | lamp_enable."

  camera_tune_persist:
    summary: "One-shot tuning of the SAA7113 video decoder via WinUSB / libusb (NOT TCP)."
    notes: |
      Out-of-band of the TCP motion protocol. Requires temporarily detaching
      the stock USB grabber driver (or installing WinUSB), running a tuning
      utility that writes the SAA7113 registers via STK1160 vendor requests,
      then restoring the original driver. Register values persist in the
      SAA7113 until USB Vbus is removed.
    see_also: "docs/12-camera-system.md"

  jog:
    summary: "Continuous motion while a button is held; stop on release."
    on_button_down:
      - "0x06 set_motion_profile_immediate — load the jog accel/decel/velocity profile for the target axis. Speed multiplier is 100% (no scaling)."
      - "0x08 move_immediate — issue a long move in the desired direction (target = a large value beyond reachable travel; the move will be stopped before it gets there)."
    on_button_up:
      - "0x09 stop axis_mask=<jog axis bit> — halt the in-flight move."
    notes: |
      Jog is not a special opcode — it is a normal move with the velocity
      profile tuned for handle-like response, terminated by stop on release.
      The motion-profile values used for jog come from the host's UI / param
      store; the controller has no concept of "jog mode" beyond the chosen
      profile values.
      Jog-speed mode bits (0x80 / 0x100 in the output bitmap) are operator-
      panel cosmetic state, not a controller-side mode flag. They light the
      front-panel speed indicator and may also pre-bias which profile the
      host loads, but they do not change controller behaviour directly.
